name: Bazel CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v2
        with:
          bazelisk-version: 1.28.1

      - name: Show Bazel Version
        run: bazel version

      - name: Build Project
        run: bazel build //...

      - name: Run Tests
        run: bazel test //...

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bazel-artifacts
          path: bazel-bin
