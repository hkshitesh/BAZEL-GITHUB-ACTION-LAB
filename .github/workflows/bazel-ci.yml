name: Bazel CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Bazel
      uses: bazelbuild/setup-bazelisk@v2

    - name: Bazel Build
      run: |
        bazel build //app:app

    - name: Run Tests
      run: |
        bazel test //tests:app_test

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: bazel-app
        path: bazel-bin/app/app
