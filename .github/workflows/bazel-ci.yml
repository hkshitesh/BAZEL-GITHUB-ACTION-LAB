name: Bazel CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4


      # Step 2: Install Bazel using Bazelisk
      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2
        with:
          bazelisk-version: latest


      # Step 3: Cache Bazel build output (speeds up CI builds)
      - name: Cache Bazel files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.bazel
          key: bazel-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            bazel-${{ runner.os }}-


      # Step 4: Show Bazel version
      - name: Check Bazel version
        run: bazel version


      # Step 5: Build the project
      - name: Build with Bazel
        run: |
          bazel build //...


      # Step 6: Run all tests
      - name: Run Bazel Tests
        run: |
          bazel test //...


      # Step 7: Upload build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazel-build-artifacts
          path: bazel-bin
